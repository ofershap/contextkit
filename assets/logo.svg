<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gauge-gradient" x1="0" y1="1" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="40%" stop-color="#facc15"/>
      <stop offset="70%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Dark circular background with visible border -->
  <circle cx="100" cy="100" r="94" fill="url(#bg)" stroke="#4a4a6a" stroke-width="3"/>

  <!-- Gauge track (grey background) - 240 degree arc -->
  <path d="M 52.4 122.5 A 55 55 0 1 1 147.6 122.5" fill="none" stroke="#2a2a4a" stroke-width="10" stroke-linecap="round"/>

  <!-- Gauge colored arc - single smooth gradient -->
  <path d="M 52.4 122.5 A 55 55 0 1 1 147.6 122.5" fill="none" stroke="url(#gauge-gradient)" stroke-width="10" stroke-linecap="round"/>

  <!-- Needle pointing to ~62% (yellow/warning zone) -->
  <line x1="100" y1="95" x2="78" y2="52" stroke="#f97316" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="100" cy="95" r="7" fill="#f97316"/>
  <circle cx="100" cy="95" r="3.5" fill="#1a1a2e"/>

  <!-- Token count -->
  <text x="100" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">4,821</text>
  <text x="100" y="157" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">tokens</text>
</svg>
